{{ define "base" }}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/public/css/styles.css">
        
        <link rel="icon" type="image/png" href="/public/img/logo_{{ .BaseData.Theme }}.png" />
        <title>Watchtower EDR</title>
    </head>
    <body class="{{ .BaseData.Theme }}">
        <div class="navigation-container">
            <aside class="menu" style="--sidebar-logo: url('/public/img/logo_{{ .BaseData.Theme }}.png');">
                <div class="sidebar-header">
                    <h2>Watchtower EDR</h2>
                </div>
                
                <nav>
                    <span class="nav-title">Menu</span>
                    
                    <a href="/" class="{{ if eq $.BaseData.CurrentPath "/" }}active{{ end }}">Dashboard</a>
                    
                    <a href="/agents" class="{{ if eq $.BaseData.CurrentPath "/agents" }}active{{ end }}">Agents</a>
                    
                    <a href="/reports" class="{{ if eq $.BaseData.CurrentPath "/reports" }}active{{ end }}">Reports</a>
                    
                    <a href="/settings" class="{{ if eq $.BaseData.CurrentPath "/settings" }}active{{ end }}">Settings</a>
                </nav>
            </aside>

            <main class="main-content">
                <header class="top-nav">
                    <div class="user-menu">
                        <button class="user-btn">{{ .BaseData.Username }}</button>
                        <div class="dropdown-content">
                            <a href="/profile">Profile</a>
                            <form action="/logout" method="POST">
                                <button type="submit">Logout</button>
                            </form>
                        </div>
                    </div>
                </header>

                <section class="content-area">
                    {{ template "content" . }}
                </section>
            </main>
        </div>
        <script src="/public/js/base.js"></script>
    </body>
</html>

{{ end }}
